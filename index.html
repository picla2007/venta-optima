<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Landing Pages con IA - Claude</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#6366f1;--primary-dark:#4f46e5;--secondary:#8b5cf6;--accent:#06b6d4;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--navy:#1e293b;--navy-dark:#0f172a;--navy-light:#334155;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-300:#cbd5e1;--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;--gray-700:#334155;--gray-800:#1e293b;--gray-900:#0f172a}
        body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;color:var(--gray-800);margin:0;padding:20px}
        .app-header{background:linear-gradient(135deg,var(--navy-dark) 0%,#1a1f3a 50%,var(--navy) 100%);padding:20px 40px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.1);margin-bottom:24px;position:relative;overflow:hidden}
        .app-header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at 20% 50%,rgba(99,102,241,0.2),transparent 50%),radial-gradient(circle at 80% 50%,rgba(139,92,246,0.2),transparent 50%);pointer-events:none}
        .header-content{max-width:100%;position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:16px}
        .title-container{display:inline-flex;align-items:center;gap:16px;background:linear-gradient(135deg,rgba(99,102,241,0.25) 0%,rgba(139,92,246,0.25) 100%);padding:16px 32px;border-radius:16px;border:2px solid rgba(99,102,241,0.4);box-shadow:0 8px 32px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.15)}
        .title-icon{font-size:36px;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3))}
        .title-text{font-size:22px;font-weight:800;background:linear-gradient(135deg,#ffffff 0%,#e0e7ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.3px}
        .title-badge{background:linear-gradient(135deg,#10b981 0%,#34d399 100%);color:white;padding:8px 16px;border-radius:10px;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;box-shadow:0 4px 12px rgba(16,185,129,0.4)}
        .header-right{display:flex;align-items:center;gap:12px}
        .autosave-indicator{display:flex;align-items:center;gap:8px;padding:8px 16px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:10px;font-size:12px;font-weight:600;color:rgba(255,255,255,0.5);transition:all 0.4s ease}
        .autosave-indicator.saved{color:#6ee7b7;border-color:rgba(16,185,129,0.35);background:rgba(16,185,129,0.1)}
        .autosave-indicator.saving{color:#fbbf24;border-color:rgba(251,191,36,0.35);background:rgba(251,191,36,0.08)}
        .autosave-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
        .autosave-indicator.saving .autosave-dot{animation:blink 1s infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
        .nav-tabs{display:flex;gap:6px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:5px}
        .nav-tab{padding:8px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;background:transparent;color:rgba(255,255,255,0.5);display:flex;align-items:center;gap:7px;white-space:nowrap}
        .nav-tab.active{background:rgba(255,255,255,0.15);color:white;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
        .nav-tab:hover:not(.active){color:rgba(255,255,255,0.8)}
        .nav-tab-badge{background:var(--danger);color:white;border-radius:10px;font-size:10px;font-weight:700;padding:2px 7px;min-width:20px;text-align:center}
        .session-banner{background:linear-gradient(135deg,rgba(16,185,129,0.08),rgba(52,211,153,0.08));border:1px solid rgba(16,185,129,0.3);border-radius:12px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
        .session-banner-left{display:flex;align-items:center;gap:10px}
        .session-banner-text{font-size:13px;font-weight:700;color:#065f46}
        .session-banner-time{font-size:11px;color:#047857;margin-top:2px}
        .btn-restore{padding:8px 16px;background:white;border:1px solid rgba(16,185,129,0.4);border-radius:8px;font-size:12px;font-weight:700;color:#065f46;cursor:pointer;transition:all 0.2s;white-space:nowrap}
        .btn-restore:hover{background:rgba(16,185,129,0.08)}
        .btn-dismiss{background:none;border:none;font-size:16px;cursor:pointer;color:#047857;opacity:0.6;padding:4px;transition:opacity 0.2s}
        .btn-dismiss:hover{opacity:1}
        .app-container{display:flex;gap:24px;max-width:1800px;margin:0 auto;min-height:calc(100vh - 140px)}
        .sidebar{width:420px;background:linear-gradient(180deg,var(--navy) 0%,var(--navy-dark) 100%);padding:32px;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);position:relative;border-radius:20px}
        .sidebar::-webkit-scrollbar{width:6px}
        .sidebar::-webkit-scrollbar-track{background:rgba(255,255,255,0.05)}
        .sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:3px}
        .ia-mode-section{background:linear-gradient(135deg,rgba(99,102,241,0.15) 0%,rgba(139,92,246,0.15) 100%);border-radius:16px;padding:24px;margin-bottom:24px;border:1px solid rgba(99,102,241,0.2)}
        .ia-mode-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
        .ia-mode-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--primary) 0%,var(--secondary) 100%);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 12px rgba(99,102,241,0.3)}
        .ia-mode-title{font-size:15px;font-weight:700;color:white;letter-spacing:-0.3px}
        .ia-mode-badge{background:white;color:var(--primary);padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-left:auto}
        .mode-selector{display:flex;gap:8px}
        .mode-btn{flex:1;padding:12px 16px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px}
        .mode-btn.cliente{background:linear-gradient(135deg,rgba(99,102,241,0.2) 0%,rgba(139,92,246,0.2) 100%);color:white;border:1px solid rgba(99,102,241,0.3)}
        .mode-btn.cliente.active{background:linear-gradient(135deg,var(--primary) 0%,var(--secondary) 100%);box-shadow:0 4px 16px rgba(99,102,241,0.4);border-color:transparent}
        .mode-btn.agencia{background:linear-gradient(135deg,rgba(147,51,234,0.2) 0%,rgba(168,85,247,0.2) 100%);color:white;border:1px solid rgba(147,51,234,0.3)}
        .mode-btn.agencia.active{background:linear-gradient(135deg,#9333ea 0%,#a855f7 100%);box-shadow:0 4px 16px rgba(147,51,234,0.4);border-color:transparent}
        .mode-btn:hover:not(.active){transform:translateY(-2px)}
        .config-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:16px;background:rgba(99,102,241,0.1);border-radius:12px;border:1px solid rgba(99,102,241,0.2)}
        .config-header-icon{font-size:20px}
        .config-header-title{font-size:13px;font-weight:700;color:var(--gray-300);text-transform:uppercase;letter-spacing:1px}
        .config-section{margin-bottom:24px}
        .config-title{font-size:12px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
        .form-group{margin-bottom:16px}
        .form-label{display:block;font-size:13px;font-weight:600;color:var(--gray-300);margin-bottom:8px}
        .form-input,.form-select{width:100%;padding:12px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:white;font-size:14px;font-family:inherit;transition:all 0.2s}
        .form-input:focus,.form-select:focus{outline:none;border-color:var(--primary);background:rgba(255,255,255,0.08);box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
        .form-input::placeholder{color:var(--gray-500)}
        .form-select option{background:var(--navy-dark);color:white}
        .checkbox-group{display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;cursor:pointer;transition:all 0.2s}
        .checkbox-group:hover{background:rgba(255,255,255,0.08);border-color:var(--primary)}
        .checkbox-group input[type="checkbox"]{width:20px;height:20px;cursor:pointer;accent-color:var(--primary)}
        .checkbox-label{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:white;cursor:pointer;user-select:none}
        .beneficio-item{display:flex;gap:8px;margin-bottom:8px}
        .beneficio-input{flex:1;padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:white;font-size:13px;font-family:inherit}
        .beneficio-input:focus{outline:none;border-color:var(--primary)}
        .btn-remove{width:36px;height:36px;background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.3);border-radius:8px;color:#fca5a5;cursor:pointer;transition:all 0.2s;font-size:14px}
        .btn-remove:hover{background:rgba(239,68,68,0.3);transform:scale(1.05)}
        .btn-add{width:100%;padding:10px;background:rgba(16,185,129,0.15);border:1px dashed rgba(16,185,129,0.4);border-radius:8px;color:#6ee7b7;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s}
        .btn-add:hover{background:rgba(16,185,129,0.25);border-color:rgba(16,185,129,0.6)}
        .tema-section{background:linear-gradient(135deg,rgba(6,182,212,0.1) 0%,rgba(99,102,241,0.1) 100%);border:1px solid rgba(6,182,212,0.2);border-radius:16px;padding:20px;margin-bottom:24px}
        .tema-section-title{display:flex;align-items:center;gap:10px;margin-bottom:16px}
        .tema-section-icon{width:36px;height:36px;background:linear-gradient(135deg,#06b6d4,#6366f1);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px}
        .tema-section-label{font-size:14px;font-weight:700;color:white}
        .tema-section-badge{margin-left:auto;background:rgba(6,182,212,0.2);color:#67e8f9;padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:0.5px}
        .tema-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
        .tema-btn{position:relative;padding:0;border:2px solid transparent;border-radius:12px;cursor:pointer;transition:all 0.2s;overflow:hidden;background:none}
        .tema-btn.active{border-color:white;box-shadow:0 0 0 3px rgba(255,255,255,0.25)}
        .tema-btn:hover:not(.active){transform:translateY(-2px);border-color:rgba(255,255,255,0.3)}
        .tema-preview{height:56px;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border-radius:10px}
        .tema-preview-bar{width:60%;height:5px;border-radius:3px;opacity:0.8}
        .tema-preview-bar2{width:40%;height:3px;border-radius:2px;opacity:0.5}
        .tema-name{font-size:11px;font-weight:700;color:white;text-align:center;padding:5px 4px;letter-spacing:0.3px}
        .tema-check{position:absolute;top:5px;right:6px;width:16px;height:16px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--navy-dark);font-weight:900;opacity:0;transition:opacity 0.2s}
        .tema-btn.active .tema-check{opacity:1}
        .hero-img-section{margin-top:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px}
        .hero-img-title{font-size:11px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
        .hero-img-input{width:100%;padding:9px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:white;font-size:12px;font-family:inherit;transition:all 0.2s;margin-bottom:6px}
        .hero-img-input:focus{outline:none;border-color:var(--primary)}
        .hero-img-input::placeholder{color:var(--gray-500)}
        .hero-img-preview{width:100%;height:70px;border-radius:8px;object-fit:cover;margin-top:6px;border:1px solid rgba(255,255,255,0.1)}
        .hero-overlay-row{display:flex;align-items:center;gap:8px;margin-top:8px}
        .hero-overlay-label{font-size:11px;color:var(--gray-400);flex:1}
        .hero-overlay-input{width:60px;padding:5px 8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:white;font-size:12px;font-family:inherit;text-align:center}
        .hero-overlay-input:focus{outline:none;border-color:var(--primary)}
        .cajas-section{margin-top:16px}
        .cajas-toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
        .cajas-toggle-label{font-size:13px;font-weight:600;color:var(--gray-300);display:flex;align-items:center;gap:8px}
        .caja-item{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px;margin-bottom:8px}
        .caja-label{font-size:10px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
        .caja-input{width:100%;padding:8px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:7px;color:white;font-size:13px;font-family:inherit;margin-bottom:6px}
        .caja-input:focus{outline:none;border-color:var(--primary)}
        .caja-input::placeholder{color:var(--gray-500)}
        .caja-textarea{width:100%;padding:8px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:7px;color:white;font-size:12px;font-family:inherit;resize:vertical;min-height:52px}
        .caja-textarea:focus{outline:none;border-color:var(--primary)}
        .caja-textarea::placeholder{color:var(--gray-500)}
        .problema-section-sidebar{background:linear-gradient(135deg,rgba(239,68,68,0.1),rgba(251,113,133,0.08));border:1px solid rgba(239,68,68,0.25);border-radius:12px;padding:14px;margin-top:16px}
        .problema-toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
        .problema-toggle-label{font-size:13px;font-weight:600;color:#fca5a5;display:flex;align-items:center;gap:8px}
        .problema-fields{display:flex;flex-direction:column;gap:8px}
        .problema-input{width:100%;padding:8px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(239,68,68,0.2);border-radius:8px;color:white;font-size:13px;font-family:inherit;transition:all 0.2s}
        .problema-input:focus{outline:none;border-color:#ef4444}
        .problema-input::placeholder{color:var(--gray-500)}
        .problema-textarea{width:100%;padding:8px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(239,68,68,0.2);border-radius:8px;color:white;font-size:12px;font-family:inherit;resize:vertical;min-height:72px;transition:all 0.2s}
        .problema-textarea:focus{outline:none;border-color:#ef4444}
        .problema-textarea::placeholder{color:var(--gray-500)}
        .problema-field-label{font-size:10px;font-weight:700;color:#fca5a5;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
        .form-builder-section{margin-top:24px}
        .form-builder-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
        .form-builder-title{font-size:12px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:8px}
        .fq-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px;margin-bottom:10px;transition:border-color 0.2s}
        .fq-card:hover{border-color:rgba(99,102,241,0.4)}
        .fq-card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
        .fq-card-num{background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;border-radius:6px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
        .fq-card-input{flex:1;padding:8px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:white;font-size:13px;font-family:inherit;transition:all 0.2s}
        .fq-card-input:focus{outline:none;border-color:var(--primary);background:rgba(255,255,255,0.09)}
        .fq-card-input::placeholder{color:var(--gray-500)}
        .fq-card-delete{width:28px;height:28px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);border-radius:7px;color:#fca5a5;cursor:pointer;font-size:13px;flex-shrink:0;transition:all 0.2s;display:flex;align-items:center;justify-content:center}
        .fq-card-delete:hover{background:rgba(239,68,68,0.3)}
        .fq-card-row{display:flex;gap:8px;align-items:flex-start}
        .fq-type-select{flex:0 0 130px;padding:7px 10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:white;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s}
        .fq-type-select:focus{outline:none;border-color:var(--primary)}
        .fq-type-select option{background:var(--navy-dark);color:white}
        .fq-opts-input{flex:1;padding:7px 10px;background:rgba(99,102,241,0.08);border:1px dashed rgba(99,102,241,0.35);border-radius:8px;color:white;font-size:12px;font-family:inherit;transition:all 0.2s}
        .fq-opts-input:focus{outline:none;border-color:var(--primary);background:rgba(99,102,241,0.12)}
        .fq-opts-input::placeholder{color:var(--gray-500)}
        .fq-add-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}.faq-builder{margin-top:12px;}.faq-items{display:flex;flex-direction:column;gap:10px;margin-top:10px;}.faq-edit-item{display:flex;flex-direction:column;gap:6px;background:var(--bg-secondary);border-radius:10px;padding:12px;}.faq-add-btn{width:100%;padding:9px;background:transparent;border:1px dashed var(--border);border-radius:8px;color:var(--gray-400);font-size:13px;cursor:pointer;margin-top:4px;font-family:inherit;transition:all 0.2s;}.faq-add-btn:hover{border-color:var(--accent);color:var(--accent);}.fq-basic-btn{width:100%;padding:9px 16px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:8px;color:white;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px;transition:all 0.2s;letter-spacing:0.3px;}.fq-basic-btn:hover{opacity:0.9;transform:translateY(-1px);}
        .fq-add-btn{padding:7px 12px;background:rgba(16,185,129,0.12);border:1px dashed rgba(16,185,129,0.35);border-radius:8px;color:#6ee7b7;cursor:pointer;font-size:11px;font-weight:600;transition:all 0.2s;display:flex;align-items:center;gap:4px}
        .fq-add-btn:hover{background:rgba(16,185,129,0.22);border-color:rgba(16,185,129,0.6)}
        .wa-section{background:linear-gradient(135deg,rgba(37,211,102,0.1),rgba(18,140,126,0.1));border:1px solid rgba(37,211,102,0.25);border-radius:12px;padding:14px;margin-top:16px}
        .wa-section-title{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;font-weight:700;color:#6ee7b7;text-transform:uppercase;letter-spacing:0.8px}
        .wa-input-wrap{position:relative;display:flex;align-items:center}
        .wa-prefix{position:absolute;left:12px;font-size:13px;font-weight:700;color:#6ee7b7;pointer-events:none}
        .wa-input{width:100%;padding:10px 12px 10px 36px;background:rgba(37,211,102,0.08);border:1px solid rgba(37,211,102,0.3);border-radius:9px;color:white;font-size:14px;font-family:inherit;transition:all 0.2s}
        .wa-input:focus{outline:none;border-color:#25d366;background:rgba(37,211,102,0.12);box-shadow:0 0 0 3px rgba(37,211,102,0.1)}

        const matchFiltro=filtro==='todos'||l.estado===filtro;
        const matchSearch=!search||l.nombre.toLowerCase().includes(search.toLowerCase())||l.telefono.includes(search)||(l.landing||'').toLowerCase().includes(search.toLowerCase());
        return matchFiltro&&matchSearch;
    });

    const stats={
        total:leads.length,
        nuevo:leads.filter(l=>l.estado==='nuevo').length,
        contactado:leads.filter(l=>l.estado==='contactado').length,
        cerrado:leads.filter(l=>l.estado==='cerrado').length,
    };

    const siguienteEstado={nuevo:'contactado',contactado:'cerrado',cerrado:'nuevo'};
    const estadoLabel={nuevo:'🔵 Nuevo',contactado:'🟡 Contactado',cerrado:'🟢 Cerrado'};

    const guardarNuevoLead=()=>{
        if(!nuevoLead.nombre.trim()){mostrarToast('⚠️ Ingresá al menos el nombre','warning');return;}
        const lead={id:uid(),nombre:nuevoLead.nombre,telefono:nuevoLead.telefono,landing:nuevoLead.landing||'Manual',estado:nuevoLead.estado,fecha:new Date().toISOString(),datos:{}};
        onAddLead(lead);
        setNuevoLead({nombre:'',telefono:'',landing:'',estado:'nuevo'});
        setShowModal(false);
        mostrarToast('✅ Lead agregado','success');
    };

    const abrirWA=(lead)=>{
        const num=lead.telefono.replace(/\D/g,'');
        if(!num){mostrarToast('⚠️ Este lead no tiene teléfono cargado','warning');return;}
        window.open(`https://wa.me/${num}`,'_blank');
    };

    const exportarCSV=()=>{
        if(leads.length===0){mostrarToast('⚠️ No hay leads para exportar','warning');return;}
        const lista=filtro==='todos'?leads:leads.filter(l=>l.estado===filtro);
        if(lista.length===0){mostrarToast('⚠️ No hay leads con ese filtro activo','warning');return;}
        const escapar=(v)=>{const s=String(v||'');return s.includes(',')||s.includes('"')||s.includes('\n')?`"${s.replace(/"/g,'""')}"`:s;};
        const filas=[['Nombre','Teléfono','Landing','Estado','Fecha','Datos'].join(',')];
        lista.forEach(l=>{
            const datos=l.datos&&Object.keys(l.datos).length>0?Object.entries(l.datos).map(([k,v])=>`${k}: ${v}`).join(' | '):'';
            filas.push([escapar(l.nombre),escapar(l.telefono),escapar(l.landing),escapar(l.estado),escapar(formatFecha(l.fecha)),escapar(datos)].join(','));
        });
        const bom='\uFEFF';

            <thead><tr><th>Nombre</th><th>Teléfono</th><th>Landing</th><th>Datos</th><th>Fecha</th><th>Estado</th><th>Acciones</th></tr></thead>
            <tbody>
            {leadsFiltrados.map(lead=>(
                <tr key={lead.id}>
                    <td><div className="crm-name">{lead.nombre}</div></td>

                    <td><span className="crm-landing-tag">{lead.landing||'—'}</span></td>

                        {lead.datos&&Object.keys(lead.datos).length>0?Object.entries(lead.datos).slice(0,2).map(([k,v])=>`${v}`).join(' · '):'—'}
                    </div></td>
                    <td><div className="crm-date">{formatFecha(lead.fecha)}</div></td>
                    <td><button className={`crm-status-btn ${lead.estado}`} onClick={()=>onUpdateLead(lead.id,{estado:siguienteEstado[lead.estado]})} title="Clic para cambiar estado">{estadoLabel[lead.estado]}</button></td>
                    <td><div className="crm-actions">
                        <button className="crm-wa-btn" onClick={()=>abrirWA(lead)} title="Abrir WhatsApp">💬</button>
                        <button className="crm-del-btn" onClick={()=>{if(confirm('¿Eliminar este lead?'))onDeleteLead(lead.id);}} title="Eliminar">🗑️</button>
                    </div></td>
                </tr>
            ))}
            </tbody>
        </table>
        </div>)}
    </div>);
}

function PreviewModal({html,temaActual,nicho,onClose,onDescargar}){
    const [device,setDevice]=useState('desktop');
    const iframeRef=useRef(null);
    useEffect(()=>{const onKey=(e)=>{if(e.key==='Escape')onClose();};document.addEventListener('keydown',onKey);document.body.style.overflow='hidden';return()=>{document.removeEventListener('keydown',onKey);document.body.style.overflow='';};},[onClose]);
    useEffect(()=>{if(iframeRef.current)iframeRef.current.srcdoc=html;},[html]);
    return(<div className="preview-overlay"><div className="preview-bar"><div className="preview-bar-left"><span style={{fontSize:'20px',flexShrink:0}}>👁️</span><span className="preview-bar-title">{nicho||'Mi Landing'}</span><span className="preview-bar-badge">{temaActual.icon} {temaActual.name}</span></div><div className="preview-devices">{[{id:'desktop',label:'🖥️ Desktop'},{id:'tablet',label:'📱 Tablet'},{id:'mobile',label:'📲 Mobile'}].map(d=>(<button key={d.id} className={`preview-device-btn ${device===d.id?'active':''}`} onClick={()=>setDevice(d.id)}>{d.label}</button>))}</div><div className="preview-bar-right"><button className="preview-dl-btn" onClick={onDescargar}>⬇️ Descargar HTML</button><button className="preview-close" onClick={onClose} title="Esc">✕</button></div></div><div className="preview-stage"><div className={`preview-frame-wrap ${device}`}><iframe ref={iframeRef} className="preview-iframe" title="Preview" sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-forms allow-top-navigation-by-user-activation"/></div></div></div>);
}

        </div>)}
    </div></div>)}
    {toast&&(<div className="toast"><span className="toast-icon">{toast.icono}</span><span className="toast-message">{toast.mensaje}</span></div>)}
    </>);
}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
